<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advait's Portfolio</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0b0f1a;
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            color: #eaeaea;
        }

        .container {
            text-align: center;
            padding: 24px;
            animation: fadeIn 1.2s ease forwards;
        }

        .tagline {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 18px;
            letter-spacing: 1px;
            color: #8fd3ff;
            text-shadow:
                0 0 8px rgba(143, 211, 255, 0.8),
                0 0 20px rgba(143, 211, 255, 0.6),
                0 0 40px rgba(143, 211, 255, 0.4);
        }

        img {
            max-width: 100%;
            max-height: 55vh;
            object-fit: contain;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            margin-bottom: 22px;
        }

        h1 {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 800;
        }

        p {
            margin-top: 8px;
            font-size: 1rem;
            color: #b5b5b5;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tagline">Nah, I’d win.</div>

        <img src="satoru-gojo-black-3840x2160-14684.png" alt="Portfolio coming soon">

        <h1>Advait</h1>
        <p>Portfolio coming soon… maybe.</p>
    </div>
</body>
</html>
